[graph]
all-features = true

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "CC0-1.0",
    "Zlib",
    "MPL-2.0",
    # `webpki-roots` ships under CDLA-Permissive-2.0. Permissive,
    # data-license-style (no copyleft, no patent-trap). Pulled in
    # transitively via sqlx → rustls (M2 P2) and hyper-rustls →
    # reqwest (M2 P1).
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.93
exceptions = []

[bans]
multiple-versions = "warn"
wildcards = "deny"
deny = [
    # See RFC §1.5: no OpenSSL inside the enclave attack surface.
    { name = "openssl-sys" },
    { name = "native-tls" },
    # See RFC §1.5: no libsecp256k1 FFI; we use the RustCrypto k256.
    { name = "secp256k1-sys" },
]

[advisories]
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"
ignore = [
    # The three advisories below ride in via dev-dependency chains and
    # are never linked into production binaries.
    # testcontainers → bollard: gated `#[ignore]` Postgres integration
    # tests in qfc-audit. Revisit when testcontainers adopts a maintained
    # replacement (astral-tokio-tar; rustls-pki-types).
    "RUSTSEC-2025-0111", # tokio-tar PAX header parsing — testcontainers chain
    "RUSTSEC-2025-0134", # rustls-pemfile unmaintained — testcontainers chain
    # utoipa-swagger-ui's syn-1 macro chain. Build-time only.
    "RUSTSEC-2024-0370",
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
