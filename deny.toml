[graph]
all-features = true

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "CC0-1.0",
    "Zlib",
    "MPL-2.0",
    # Permissive — used by webpki-roots (transitive via sqlx → rustls).
    # CDLA-Permissive is data-license-style permissive, not copyleft.
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.93
exceptions = []

[bans]
multiple-versions = "warn"
wildcards = "deny"
deny = [
    # See RFC §1.5: no OpenSSL inside the enclave attack surface.
    { name = "openssl-sys" },
    { name = "native-tls" },
    # See RFC §1.5: no libsecp256k1 FFI; we use the RustCrypto k256.
    { name = "secp256k1-sys" },
]

[advisories]
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"
ignore = [
    # Both advisories below ride in via `testcontainers` → `bollard` and are
    # *dev-dependency-only* (gated `#[ignore]` Postgres integration tests in
    # `qfc-audit`). They are never linked into production binaries. Revisit
    # when `testcontainers` adopts a maintained replacement (astral-tokio-tar
    # for tokio-tar, rustls-pki-types for rustls-pemfile).
    "RUSTSEC-2025-0111", # tokio-tar PAX header parsing — testcontainers chain
    "RUSTSEC-2025-0134", # rustls-pemfile unmaintained — testcontainers chain
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
