name: cargo-audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * *"

jobs:
  audit:
    name: cargo-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo install cargo-audit --locked
      # Ignored advisories mirror `deny.toml` — testcontainers dev-dep chain
      # (RUSTSEC-2025-0111 tokio-tar, RUSTSEC-2025-0134 rustls-pemfile) and
      # utoipa-swagger-ui build-time syn-1 chain (RUSTSEC-2024-0370). None of
      # these are linked into production binaries.
      - run: |
          cargo audit --deny warnings \
            --ignore RUSTSEC-2025-0111 \
            --ignore RUSTSEC-2025-0134 \
            --ignore RUSTSEC-2024-0370
