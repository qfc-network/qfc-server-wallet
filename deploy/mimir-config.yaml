# Mimir — minimal single-process config for local-dev observability.
#
# Mimir is normally run as a horizontally-scaled deployment with each
# component (distributor / ingester / store-gateway / querier / ...) as
# its own service. For local dev we collapse everything into one
# process using `target: all`, with filesystem storage instead of S3.
#
# This config is NOT a production reference; it exists so dashboards in
# Grafana can query something Prometheus-compatible without us having
# to also run Prometheus.

target: all

# Multi-tenancy disabled — every metric lives under tenant `anonymous`.
# The OTLP collector still sends the `X-Scope-OrgID: qfc` header; with
# auth disabled, Mimir ignores it but accepts the write.
multitenancy_enabled: false

server:
  http_listen_port: 9009
  grpc_listen_port: 9095
  log_level: warn

# Use local filesystem for all storage — fine for ephemeral dev volumes.
common:
  storage:
    backend: filesystem
    filesystem:
      dir: /data/blocks

blocks_storage:
  backend: filesystem
  filesystem:
    dir: /data/blocks
  bucket_store:
    sync_dir: /data/tsdb-sync
  tsdb:
    dir: /data/tsdb

compactor:
  data_dir: /data/compactor
  sharding_ring:
    kvstore:
      store: memberlist

distributor:
  ring:
    instance_addr: 127.0.0.1
    kvstore:
      store: memberlist

ingester:
  ring:
    instance_addr: 127.0.0.1
    kvstore:
      store: memberlist
    replication_factor: 1

ruler:
  rule_path: /data/rules

ruler_storage:
  backend: filesystem
  filesystem:
    dir: /data/ruler

store_gateway:
  sharding_ring:
    replication_factor: 1

# Permissive ingestion limits — dev cardinality may spike from tests.
limits:
  ingestion_rate: 100000
  ingestion_burst_size: 200000
  max_global_series_per_user: 0
  max_label_names_per_series: 60
  out_of_order_time_window: 5m

# memberlist with no peers — single-instance "cluster"
memberlist:
  join_members: []
